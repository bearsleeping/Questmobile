<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Quest Mobile - Offline</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-container" style="min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 24px;">
    <div class="md3-card" style="max-width: 420px; width: 100%; text-align: center;">
      <h1 class="md3-title-large" style="margin: 0 0 8px;">Brak polaczenia</h1>
      <p class="md3-body-medium" style="margin: 0 0 20px;">
        Strona jest niedostepna, poniewaz jestes offline.
      </p>
      <button class="md3-btn md3-btn-filled width-full" type="button" onclick="location.reload()">
        Odswiez i sproboj ponownie
      </button>
    </div>
  </main>
</body>
</html>
